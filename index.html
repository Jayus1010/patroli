<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patroli Security - JAPFA FOOD</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --japfa-navy: #002D62; 
            --japfa-red: #E31E24;
            --bg-light: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; background: var(--bg-light); 
            display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 480px; background: white;
            min-height: 100vh; display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            background: var(--japfa-navy); color: white;
            padding: 35px 20px; text-align: center;
            border-bottom: 5px solid var(--japfa-red);
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }

        .logo-box {
            width: 140px; background: white; border-radius: 10px;
            margin: 0 auto 15px; padding: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .logo-box img { width: 100%; height: auto; display: block; }

        .header h1 { font-size: 18px; margin: 5px 0; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; }
        .header p { font-size: 12px; margin: 0; opacity: 0.9; letter-spacing: 0.5px; }

        .main-content { padding: 25px 20px; flex-grow: 1; }

        .input-group { margin-bottom: 25px; text-align: left; }

        label { font-size: 11px; font-weight: bold; color: var(--japfa-navy); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }

        select {
            width: 100%; padding: 14px; border-radius: 10px;
            border: 2px solid #e0e0e0; font-size: 16px; color: var(--japfa-navy);
            background: #fff; outline: none; font-weight: 600;
        }

        #reader { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            border: 2px solid #eee !important; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.08); 
        }

        .btn-action {
            display: none; width: 100%; padding: 18px;
            background: var(--japfa-navy); color: white;
            border: 2px solid var(--japfa-red); border-radius: 12px; 
            font-weight: bold; font-size: 15px; text-transform: uppercase; 
            margin-top: 20px; cursor: pointer;
        }

        #status-display {
            margin-top: 20px; padding: 15px; border-radius: 12px;
            font-size: 13px; background: #ffffff; border: 1px dashed #ccc;
            line-height: 1.5; color: #444;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo-box">
            <img src="https://i.ibb.co.com/8L8YVfPZ/Japfa-Food-Logo.png" alt="Japfa Food Logo">
        </div>
        <h1>Security Patrol</h1>
        <p>Probolinggo Unit System</p>
    </div>

    <div class="main-content">
        <div class="input-group">
            <label>Petugas Terautentikasi</label>
            <select id="personil">
                <option value="Ansori">Ansori</option>
                <option value="Mustofa">Mustofa</option>
                <option value="Ja'far Sodik">Ja'far Sodik</option>
                <option value="Yusuf">Yusuf</option>
                <option value="Abdul Rochim">Abdul Rochim</option>
                <option value="M. Syaiful Rizal">M. Syaiful Rizal</option>
                <option value="Akhmad Kholil">Akhmad Kholil</option>
                <option value="Moh Sudi">Moh Sudi</option>
                <option value="Saeri">Saeri</option>
                <option value="Buhar">Buhar</option>
                <option value="Moh. Ainul Yakin">Moh. Ainul Yakin</option>
                <option value="Pangestu">Pangestu</option>
            </select>
        </div>

        <div id="reader"></div>

        <button id="btn-next" class="btn-action" onclick="location.reload()">✅ Lanjutkan Patroli</button>
        
        <div id="status-display">Sistem siap. Silakan arahkan kamera ke QR Code cekpoin.</div>
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const statusDisplay = document.getElementById("status-display");

    function startApp() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan);
    }

    function onScan(decodedText) {
        html5QrCode.stop();
        statusDisplay.innerHTML = "<b>[SISTEM]</b> Mengunci koordinat GPS... Mohon jangan berpindah tempat.";
        statusDisplay.style.color = "#E31E24";

        navigator.geolocation.getCurrentPosition(function(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;
            const user = document.getElementById("personil").value;

            fetch("https://script.google.com/macros/s/AKfycbzISsPsXdRsExjLVZEpul0Bt1cBKtoDZbdZtMtLpPw-wc5YsW1RZU39lE3EvLoFo7w/exec", {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ personil: user, cekpoin: decodedText, lokasi: mapLink })
            }).then(() => {
                statusDisplay.style.background = "#002D62";
                statusDisplay.style.color = "#ffffff";
                statusDisplay.style.border = "1px solid #E31E24";
                statusDisplay.innerHTML = `<b>BERHASIL DISIMPAN</b><br>Lokasi: ${decodedText}<br>Koordinat: ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                document.getElementById("btn-next").style.display = "block";
            });

        }, function(err) {
            alert("Akses GPS diperlukan untuk validasi patroli.");
            location.reload();
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
    }

    startApp();
</script>
</body>
</html>
