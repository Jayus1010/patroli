<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patroli Security - JAPFA</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --japfa-navy: #002D62; 
            --japfa-red: #E31E24;
            --brand-gold: #c5a059;
            --bg-light: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; background: var(--bg-light); 
            display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 480px; background: white;
            min-height: 100vh; display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            background: var(--japfa-navy); color: white;
            padding: 30px 20px; text-align: center;
            border-bottom: 4px solid var(--japfa-red);
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
        }

        .logo-box {
            width: 120px; background: white; border-radius: 12px;
            margin: 0 auto 15px; padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .logo-box img { width: 100%; height: auto; }

        .header h1 { font-size: 18px; margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }

        .main-content { padding: 25px 20px; flex-grow: 1; }

        .input-group { margin-bottom: 20px; text-align: left; }

        label { font-size: 12px; font-weight: bold; color: var(--japfa-navy); text-transform: uppercase; margin-bottom: 8px; display: block; }

        select {
            width: 100%; padding: 15px; border-radius: 10px;
            border: 2px solid #ddd; font-size: 16px; color: var(--japfa-navy);
            background: #fff; outline: none;
        }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: none !important; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .btn-action {
            display: none; width: 100%; padding: 18px;
            background: var(--japfa-navy); color: white;
            border: none; border-radius: 10px; font-weight: bold;
            font-size: 15px; text-transform: uppercase; margin-top: 20px;
        }

        #status-display {
            margin-top: 15px; padding: 15px; border-radius: 10px;
            font-size: 13px; background: #f9f9f9; border-left: 5px solid #ccc;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo-box">
            <img src="https://upload.wikimedia.org/wikipedia/id/thumb/a/a2/Japfa_Comfeed_Indonesia_logo.svg/1200px-Japfa_Comfeed_Indonesia_logo.svg.png" alt="Japfa Logo">
        </div>
        <h1>Security Patrol</h1>
        <p>Unit Probolinggo</p>
    </div>

    <div class="main-content">
        <div class="input-group">
            <label>Pilih Petugas:</label>
            <select id="personil">
                <option value="Ansori">Ansori</option>
                <option value="Mustofa">Mustofa</option>
                <option value="Ja'far Sodik">Ja'far Sodik</option>
                <option value="Yusuf">Yusuf</option>
                <option value="Abdul Rochim">Abdul Rochim</option>
                <option value="M. Syaiful Rizal">M. Syaiful Rizal</option>
                <option value="Akhmad Kholil">Akhmad Kholil</option>
                <option value="Moh Sudi">Moh Sudi</option>
                <option value="Saeri">Saeri</option>
                <option value="Buhar">Buhar</option>
                <option value="Moh. Ainul Yakin">Moh. Ainul Yakin</option>
                <option value="Pangestu">Pangestu</option>
            </select>
        </div>

        <div id="reader"></div>

        <button id="btn-next" class="btn-action" onclick="location.reload()">✅ Scan Selanjutnya</button>
        
        <div id="status-display">Siap melakukan pemindaian...</div>
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const statusDisplay = document.getElementById("status-display");

    function startApp() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan);
    }

    function onScan(decodedText) {
        html5QrCode.stop();
        statusDisplay.style.borderLeftColor = "#f1c40f";
        statusDisplay.innerHTML = "<b>⏳ MENGUNCI LOKASI...</b><br>Mohon tunggu sebentar.";

        navigator.geolocation.getCurrentPosition(function(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;
            const user = document.getElementById("personil").value;

            fetch("https://script.google.com/macros/s/AKfycbzISsPsXdRsExjLVZEpul0Bt1cBKtoDZbdZtMtLpPw-wc5YsW1RZU39lE3EvLoFo7w/exec", {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ personil: user, cekpoin: decodedText, lokasi: mapLink })
            }).then(() => {
                statusDisplay.style.borderLeftColor = "#27ae60";
                statusDisplay.style.background = "#e8f5e9";
                statusDisplay.innerHTML = `<b>✅ BERHASIL DISIMPAN</b><br>Petugas: ${user}<br>Lokasi: ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
                document.getElementById("btn-next").style.display = "block";
            });

        }, function(err) {
            alert("Akses GPS ditolak! Aplikasi memerlukan lokasi untuk validasi.");
            location.reload();
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
    }

    startApp();
</script>
</body>
</html>
