<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Patroli Terpadu</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            /* Warna berdasarkan Corporate Guideline */
            --brand-navy: #1a2a40; 
            --brand-gold: #c5a059;
            --brand-light: #f4f7f6;
            --brand-white: #ffffff;
        }

        body { 
            font-family: 'Montserrat', 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            background: var(--brand-light); 
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--brand-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Header Profesional sesuai Identity Guideline */
        .header {
            background: var(--brand-navy);
            color: var(--brand-white);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--brand-gold);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .logo-area {
            width: 90px;
            height: 90px;
            background: var(--brand-white);
            border-radius: 18px; /* Mengikuti gaya modern di guideline */
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            padding: 10px;
        }

        .logo-area img {
            max-width: 100%;
            height: auto;
        }

        .header h1 {
            font-size: 18px;
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .header p {
            font-size: 12px;
            margin: 0;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .main-content {
            padding: 25px 20px;
            flex-grow: 1;
        }

        /* Styling Input & Card */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            font-size: 12px;
            font-weight: bold;
            color: var(--brand-navy);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            font-size: 16px;
            color: var(--brand-navy);
            background: #fff;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--brand-gold);
        }

        /* Scanner Area */
        #reader { 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            border: none !important;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        /* Tombol Aksi */
        .btn-action {
            display: none;
            width: 100%;
            padding: 18px;
            background: var(--brand-navy);
            color: var(--brand-gold);
            border: 2px solid var(--brand-gold);
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-action:active {
            transform: scale(0.98);
            background: var(--brand-gold);
            color: var(--brand-navy);
        }

        /* Status Box */
        #status-display {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            background: #fdfdfd;
            border: 1px dashed #ccc;
            color: #555;
        }

        .footer-note {
            padding: 20px;
            font-size: 10px;
            color: #aaa;
            text-align: center;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <img src="https://cdn-icons-png.flaticon.com/512/582/582761.png" alt="Corporate Logo">
        </div>
        <h1>Security Patrol</h1>
        <p>Identity & Protection System</p>
    </div>

    <div class="main-content">
        <div class="input-group">
            <label>Authorized Personnel</label>
            <select id="personil">
                <option value="Ansori">Ansori</option>
                <option value="Mustofa">Mustofa</option>
                <option value="Ja'far Sodik">Ja'far Sodik</option>
                <option value="Yusuf">Yusuf</option>
                <option value="Abdul Rochim">Abdul Rochim</option>
                <option value="M. Syaiful Rizal">M. Syaiful Rizal</option>
                <option value="Akhmad Kholil">Akhmad Kholil</option>
                <option value="Moh Sudi">Moh Sudi</option>
                <option value="Saeri">Saeri</option>
                <option value="Buhar">Buhar</option>
                <option value="Moh. Ainul Yakin">Moh. Ainul Yakin</option>
                <option value="Pangestu">Pangestu</option>
            </select>
        </div>

        <div id="reader"></div>

        <button id="btn-next" class="btn-action" onclick="location.reload()">Proceed to Next Point</button>
        
        <div id="status-display">Ready for scanning. Please ensure GPS is enabled for verification.</div>
    </div>

    <div class="footer-note">
        &copy; 2026 Corporate Identity Protected System
    </div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const statusDisplay = document.getElementById("status-display");

    function initScanner() {
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanDone);
    }

    function onScanDone(decodedText) {
        html5QrCode.stop();
        statusDisplay.innerHTML = "<b>[SYSTEM]</b> Locking GPS coordinates... Please hold.";
        statusDisplay.style.color = "#c5a059";

        navigator.geolocation.getCurrentPosition(function(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const mapLink = "https://www.google.com/maps?q=" + lat + "," + lon;
            const user = document.getElementById("personil").value;

            fetch("https://script.google.com/macros/s/AKfycbzISsPsXdRsExjLVZEpul0Bt1cBKtoDZbdZtMtLpPw-wc5YsW1RZU39lE3EvLoFo7w/exec", {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ personil: user, cekpoin: decodedText, lokasi: mapLink })
            }).then(() => {
                statusDisplay.style.background = "#1a2a40";
                statusDisplay.style.color = "#c5a059";
                statusDisplay.style.border = "1px solid #c5a059";
                statusDisplay.innerHTML = `<b>SUCCESS</b><br>Point: ${decodedText}<br>Verified at: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
                document.getElementById("btn-next").style.display = "block";
            });

        }, function(err) {
            alert("Location access denied. System requires GPS for authentication.");
            location.reload();
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
    }

    initScanner();
</script>
</body>
</html>
