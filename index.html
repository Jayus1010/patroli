<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patroli Security - Realtime GPS</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 15px; }
        #btn-next { display:none; width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        .log-status { margin-top: 15px; font-size: 14px; color: #555; text-align: left; padding: 10px; border-top: 1px solid #eee; }
        .gps-indicator { color: #27ae60; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ Patroli Probolinggo</h2>
    <div id="gps-status" class="gps-indicator">🛰️ Mencari Sinyal GPS...</div>
    
    <select id="personil">
        <option value="Ansori">Ansori</option>
        <option value="Mustofa">Mustofa</option>
        <option value="Ja'far Sodik">Ja'far Sodik</option>
        <option value="Yusuf">Yusuf</option>
        <option value="Abdul Rochim">Abdul Rochim</option>
        <option value="M. Syaiful Rizal">M. Syaiful Rizal</option>
        <option value="Akhmad Kholil">Akhmad Kholil</option>
        <option value="Moh Sudi">Moh Sudi</option>
        <option value="Saeri">Saeri</option>
        <option value="Buhar">Buhar</option>
        <option value="Moh. Ainul Yakin">Moh. Ainul Yakin</option>
        <option value="Pangestu">Pangestu</option>
    </select>

    <div id="reader"></div>
    <button id="btn-next" onclick="location.reload()">Scan Cekpoin Selanjutnya</button>
    <div id="status" class="log-status">Silakan pilih nama & mulai scan.</div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const statusDiv = document.getElementById("status");
    const gpsStatus = document.getElementById("gps-status");
    
    let currentLat = null;
    let currentLon = null;

    // FUNGSI BARU: Pantau GPS terus menerus (Realtime)
    function watchGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                currentLat = pos.coords.latitude;
                currentLon = pos.coords.longitude;
                gpsStatus.innerHTML = `🛰️ GPS Aktif: ${currentLat.toFixed(5)}, ${currentLon.toFixed(5)}`;
                gpsStatus.style.color = "#27ae60";
            }, (err) => {
                gpsStatus.innerHTML = "⚠️ GPS Error: " + err.message;
                gpsStatus.style.color = "#e74c3c";
            }, { 
                enableHighAccuracy: true, 
                maximumAge: 0 
            });
        }
    }

    function startScan() {
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            onScanSuccess
        );
    }

    async function onScanSuccess(decodedText) {
        if (currentLat === null) {
            alert("Tunggu sampai GPS terkunci (Indikator Hijau)!");
            return;
        }

        await html5QrCode.stop();
        statusDiv.innerHTML = "⏳ Mengirim data lokasi terbaru...";

        const linkMap = `https://www.google.com/maps?q=${currentLat},${currentLon}`;
        const nama = document.getElementById("personil").value;

        try {
            await fetch("https://script.google.com/macros/s/AKfycbzISsPsXdRsExjLVZEpul0Bt1cBKtoDZbdZtMtLpPw-wc5YsW1RZU39lE3EvLoFo7w/exec", {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    personil: nama,
                    cekpoin: decodedText,
                    lokasi: linkMap
                })
            });
            
            statusDiv.innerHTML = `✅ <b>TERSIMPAN!</b><br>Lokasi: ${currentLat}, ${currentLon}`;
            document.getElementById("btn-next").style.display = "block";
        } catch (e) {
            statusDiv.innerHTML = "❌ Gagal kirim. Cek koneksi internet.";
        }
    }

    // Jalankan GPS & Scanner
    watchGPS();
    startScan();
</script>
</body>
</html>
