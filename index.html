<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Patroli Security</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #eef2f3; 
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #reader { 
            width: 100%; 
            border-radius: 10px; 
            overflow: hidden;
            border: none !important;
        }
        #result-section { 
            margin-top: 20px; 
            text-align: left;
        }
        .log-entry {
            background: #f9f9f9;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛡️ Patroli Security</h2>
        <p>Arahkan kamera ke Barcode cekpoin</p>
        
        <div id="reader"></div>
        
        <div id="result-section">
            <h4>Riwayat Scan:</h4>
            <div id="scanned-result">
                <p style="color: #999;">Belum ada data scan...</p>
            </div>
        </div>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            const waktu = new Date().toLocaleString('id-ID');
            
            // 1. Tampilkan status di layar HP
            const resultDiv = document.getElementById('scanned-result');
            const newLog = document.createElement("div");
            newLog.className = "log-entry";
            newLog.innerHTML = `⏳ Mengirim: <b>${decodedText}</b>...`;
            
            if (resultDiv.firstChild && resultDiv.firstChild.tagName === 'P') {
                resultDiv.innerHTML = '';
            }
            resultDiv.insertBefore(newLog, resultDiv.firstChild);

            // 2. KIRIM KE GOOGLE SHEETS
            // Menggunakan link Google Script Anda
            fetch("https://script.google.com/macros/s/AKfycbzISsPsXdRsExjLVZEpul0Bt1cBKtoDZbdZtMtLpPw-wc5YsW1RZU39lE3EvLoFo7w/exec", {
                method: "POST",
                mode: "no-cors", // Penting untuk menghindari error keamanan browser
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ "cekpoin": decodedText })
            })
            .then(() => {
                newLog.innerHTML = `✅ <b>${decodedText}</b> <br> <small>${waktu} (Tersimpan)</small>`;
            })
            .catch(err => {
                newLog.innerHTML = `❌ Gagal Simpan: <b>${decodedText}</b>`;
                console.error(err);
            });
        }

        function onScanFailure(error) {
            // Abaikan error deteksi
        }

        // Jalankan Scanner hanya satu kali di sini
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: { width: 250, height: 250 } }
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>

</body>
</html>
