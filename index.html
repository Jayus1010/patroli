<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Patroli Security - Versi GPS Akurat</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom: 15px; }
        #btn-next { display:none; width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; margin-top: 15px; font-weight: bold; font-size: 16px; }
        .log-status { margin-top: 15px; font-size: 14px; color: #555; text-align: left; padding: 10px; border-top: 1px solid #eee; }
        h2 { color: #333; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ Patroli Probolinggo</h2>
    <p>Pilih nama Anda sebelum scan:</p>
    <select id="personil">
        <option value="Ansori">Ansori</option>
        <option value="Mustofa">Mustofa</option>
        <option value="Ja'far Sodik">Ja'far Sodik</option>
        <option value="Yusuf">Yusuf</option>
        <option value="Abdul Rochim">Abdul Rochim</option>
        <option value="M. Syaiful Rizal">M. Syaiful Rizal</option>
        <option value="Akhmad Kholil">Akhmad Kholil</option>
        <option value="Moh Sudi">Moh Sudi</option>
        <option value="Saeri">Saeri</option>
        <option value="Buhar">Buhar</option>
        <option value="Moh. Ainul Yakin">Moh. Ainul Yakin</option>
        <option value="Pangestu">Pangestu</option>
    </select>

    <div id="reader"></div>
    <button id="btn-next" onclick="location.reload()">Scan Cekpoin Selanjutnya</button>
    <div id="status" class="log-status">Menunggu Scan...</div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const statusDiv = document.getElementById("status");

    function startScan() {
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            onScanSuccess
        ).catch(err => {
            statusDiv.innerHTML = "❌ Kamera tidak dapat diakses.";
        });
    }

    async function onScanSuccess(decodedText) {
        // 1. Langsung matikan scanner agar tidak double
        await html5QrCode.stop();
        statusDiv.innerHTML = "⏳ <b>Menunggu GPS...</b> (Mohon jangan pindah halaman)";

        // 2. Ambil lokasi GPS (Paksa Akurasi Tinggi & Lokasi Baru)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const linkMap = `https://www.google.com/maps?q=${lat},${lon}`;
            const nama = document.getElementById("personil").value;

            statusDiv.innerHTML = "⏳ <b>Lokasi terkunci!</b> Mengirim data ke Sheets...";

            // 3. Kirim ke Google Apps Script Anda
            try {
                await fetch("https://script.google.com/macros/s/AKfycbzISsPsXdRsExjLVZEpul0Bt1cBKtoDZbdZtMtLpPw-wc5YsW1RZU39lE3EvLoFo7w/exec", {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        personil: nama,
                        cekpoin: decodedText,
                        lokasi: linkMap
                    })
                });
                
                statusDiv.innerHTML = `
                    <b style="color:green">✅ DATA BERHASIL DISIMPAN</b><br>
                    Cekpoin: ${decodedText}<br>
                    Waktu: ${new Date().toLocaleString('id-ID')}
                `;
                document.getElementById("btn-next").style.display = "block";
            } catch (e) {
                statusDiv.innerHTML = "❌ Gagal mengirim ke Google Sheets.";
                console.error(e);
            }
        }, (err) => {
            alert("Gagal mengambil GPS! Pastikan GPS HP Aktif dan pilih 'Akurasi Tinggi'.");
            location.reload();
        }, { 
            enableHighAccuracy: true, // Paksa pakai Satelit
            timeout: 15000,           // Tunggu maksimal 15 detik
            maximumAge: 0             // Larang pakai lokasi lama (Cache)
        });
    }

    // Jalankan scanner otomatis
    startScan();
</script>
</body>
</html>
